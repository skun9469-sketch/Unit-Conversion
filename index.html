<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Metric/Imperial Unit Conversion</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/png" href="/new super project/app.logo.png" />
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>Metric/Imperial Unit Conversion</h1>
        <input type="text" class="input" />
        <button id="convert-btn">Convert</button>
      </div>
      <div class="main">
        <div class="length">
          <h3>Length (Meter/Feet)</h3>
          <p>
            <span id="meters1">--</span> meters =
            <span id="feet1">--.---</span> feet |
            <span id="feet2">--</span> feet =
            <span id="meters2">--.---</span> meters
          </p>
        </div>
        <div class="volume">
          <h3>Volume (Liters/Gallons)</h3>
          <p>
            <span id="liters1">--</span> liters =
            <span id="gallons1">--.---</span> gallons |
            <span id="gallons2">--</span> gallons =
            <span id="liters2">--.---</span> liters
          </p>
        </div>
        <div class="mass">
          <h3>Mass (Kilograms/Pounds)</h3>
          <p>
            <span id="kilos1">--</span> kilos =
            <span id="pounds1">--.---</span> pounds |
            <span id="pounds2">--</span> pounds =
            <span id="kilos2">--.---</span> kilos
          </p>
        </div>
      </div>
    </div>
    <script src="index.js"></script>
  </body>
</html>
